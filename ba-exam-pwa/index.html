    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html{scroll-behavior:smooth} body{margin:0;min-height:100vh;background:linear-gradient(180deg,rgba(15,118,110,.16),rgba(244,246,248,0) 260px),var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;letter-spacing:0} button,textarea{font:inherit} button{touch-action:manipulation}.app{width:min(100%,560px);margin:0 auto;min-height:100vh;padding:14px 12px var(--bottom)}.top{position:sticky;top:0;z-index:5;margin:-14px -12px 12px;padding:calc(12px + env(safe-area-inset-top)) 12px 12px;background:rgba(244,246,248,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(214,220,229,.72)}.title-row{display:flex;align-items:center;justify-content:space-between;gap:10px}h1{margin:0;font-size:19px;line-height:1.25}.mini{display:inline-flex;align-items:center;min-height:28px;border:1px solid rgba(15,118,110,.26);border-radius:999px;background:rgba(255,255,255,.86);color:#0b4e49;padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap}.progress{display:grid;gap:8px;margin-top:12px}.progress-info{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:13px}.track{height:8px;overflow:hidden;border-radius:999px;background:#e5e9ef}.fill{height:100%;width:0%;border-radius:inherit;background:linear-gradient(90deg,var(--brand),var(--brand-2));transition:width .18s ease}.tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;min-height:38px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#344054;padding:7px 12px;font-size:14px;font-weight:700;cursor:pointer}.tab.active{color:#fff;background:var(--brand);border-color:var(--brand)}.toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}.tool{min-height:42px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#344054;font-size:14px;font-weight:700;cursor:pointer}.tool.active{color:#fff;background:var(--brand-2);border-color:var(--brand-2)}.card{border:1px solid var(--line);border-radius:8px;background:var(--card);box-shadow:var(--shadow);padding:16px;min-height:58vh;display:flex;flex-direction:column}.meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}.tag{display:inline-flex;align-items:center;min-height:28px;border-radius:999px;background:#eef2f6;color:#344054;padding:3px 10px;font-size:12px;font-weight:800}.score{color:var(--muted);font-size:13px;white-space:nowrap}.q{margin:0;font-size:18px;line-height:1.58;font-weight:800}.formula{margin-top:12px;border-left:3px solid var(--brand);border-radius:0 8px 8px 0;background:#f0fbf8;color:#164e46;padding:10px 11px;line-height:1.65;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;overflow-x:auto}.options{display:grid;gap:10px;margin-top:16px}.option{display:grid;grid-template-columns:32px minmax(0,1fr);align-items:start;gap:10px;width:100%;min-height:56px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:12px;text-align:left;cursor:pointer}.letter{display:grid;place-items:center;width:32px;height:32px;border-radius:999px;background:#eef2f6;color:#475467;font-weight:900}.option.correct{border-color:var(--right);background:var(--right-bg)}.option.correct .letter{color:#fff;background:var(--right)}.option.wrong{border-color:var(--wrong);background:var(--wrong-bg)}.option.wrong .letter{color:#fff;background:var(--wrong)}.option:disabled{cursor:default}.feedback{display:none;margin-top:14px;border-radius:8px;padding:12px;line-height:1.6;font-size:15px}.feedback.show{display:block}.feedback.correct{background:var(--right-bg);color:#064e3b}.feedback.wrong{background:var(--wrong-bg);color:#7a271a}.answer{width:100%;flex:1;min-height:260px;margin-top:16px;border:1px solid var(--line);border-radius:8px;background:#fbfcfd;color:var(--ink);padding:13px;line-height:1.65;resize:vertical;font-size:16px}.hint{margin-top:12px;border-radius:8px;background:var(--note);color:#7a4604;padding:10px 12px;line-height:1.55;font-size:14px}.subject-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.secondary{min-height:46px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#344054;font-weight:800;cursor:pointer}.secondary.done{color:#fff;background:var(--brand);border-color:var(--brand)}.empty{border:1px dashed var(--line);border-radius:8px;background:#fff;color:var(--muted);padding:28px 16px;text-align:center;line-height:1.6}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:10;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid rgba(214,220,229,.86)}.bottom-inner{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:10px;width:min(100%,560px);margin:0 auto}.nav-btn{min-height:48px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#344054;font-weight:900;cursor:pointer}.nav-btn.primary{color:#fff;background:var(--brand);border-color:var(--brand)}.nav-btn:disabled{opacity:.45;cursor:default}.jump{position:fixed;inset:0;z-index:20;display:none;padding:calc(18px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));background:rgba(20,27,36,.48)}.jump.show{display:grid;place-items:end center}.sheet{width:min(100%,560px);max-height:82vh;overflow:auto;border-radius:12px 12px 8px 8px;background:#fff;box-shadow:var(--shadow);padding:14px}.sheet-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.sheet-head h2{margin:0;font-size:18px}.close{width:42px;height:42px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#344054;font-size:22px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.num{min-height:44px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#344054;font-weight:900;cursor:pointer}.num.active{color:#fff;background:var(--brand-2);border-color:var(--brand-2)}.num.done{border-color:rgba(8,116,67,.4);background:var(--right-bg);color:#064e3b}.num.wrong{border-color:rgba(180,35,24,.38);background:var(--wrong-bg);color:#7a271a}@media (min-width:720px){.app{padding-top:22px}.top{border-radius:0 0 8px 8px}.card{min-height:520px}}

  <div class="app"><header class="top"><div class="title-row"><h1>商务分析期末手机试卷</h1><span class="mini" id="scoreMini">0 / 24</span></div><div class="progress"><div class="progress-info"><span id="modeLabel">全部题目</span><span id="progressLabel">第 1 题</span></div><div class="track"><div class="fill" id="fill"></div></div></div><nav class="tabs" id="tabs" aria-label="题型切换"></nav></header><div class="toolbar"><button class="tool active" id="allBtn" type="button">全部</button><button class="tool" id="wrongBtn" type="button">错题</button><button class="tool" id="resetBtn" type="button">重置</button></div><main id="stage"></main></div>

  <div class="jump" id="jumpPanel" aria-hidden="true"><div class="sheet"><div class="sheet-head"><h2>选择题号</h2><button class="close" id="closeJump" type="button" aria-label="关闭">×</button></div><div class="grid" id="numberGrid"></div></div></div>
  <script>
    const sections=[{id:"terms",name:"名词",cards:[{type:"choice",score:"2 分",tag:"商务分析",q:"商务分析的本质最准确的是哪一项？",options:["只使用 Excel 制作经营报表","通过数据管理、分析与挖掘，把数据转化为信息和知识，支持管理决策","用算法替代所有管理者的判断","只关注企业内部结构化数据"],answer:1,explain:"商务分析强调从数据到信息、知识，再到管理决策支持，不等同于单纯报表或算法自动化。"},{type:"choice",score:"2 分",tag:"大数据 4V",q:"大数据 4V 不包括下列哪一项？",options:["Volume","Variety","Visibility","Velocity"],answer:2,explain:"课程资料中的 4V 是 Volume、Variety、Value、Velocity。Visibility 不是本课程列出的 4V。"},{type:"choice",score:"2 分",tag:"CRISP-DM",q:"CRISP-DM 中把业务目标转化为数据挖掘目标的阶段是？",options:["商业理解","数据准备","模型评估","结果部署"],answer:0,explain:"商业理解阶段要确定业务目标、数据挖掘目标、成功标准和项目计划。"},{type:"choice",score:"2 分",tag:"文本挖掘",q:"TF-IDF 的主要作用是？",options:["衡量词在文档中的重要性","计算网络直径","替代训练集和测试集划分","自动判断模型是否过拟合"],answer:0,explain:"TF-IDF 结合词频和逆文档频率，用来衡量词对某篇文档的区分度或重要性。"},{type:"choice",score:"2 分",tag:"社交网络",q:"在社交网络分析中，处在许多最短路径上的节点通常具有较高的什么指标？",options:["度中心性","中间中心性","网络密度","互惠性"],answer:1,explain:"中间中心性衡量节点作为桥接点、控制资源或信息流动的程度。"},{type:"choice",score:"2 分",tag:"深度学习",q:"深度学习与传统机器学习相比，最典型的特征是？",options:["完全不需要数据","只能处理结构化表格","基于多层神经网络自动学习特征表示","一定比所有传统模型更可解释"],answer:2,explain:"深度学习的关键是多层神经网络和特征表示学习，但通常数据和算力需求更高，可解释性也更弱。"},{type:"choice",score:"2 分",tag:"分类",q:"分类分析要解决的核心问题是？",options:["在无预设类别下发现群组","预测离散类别或标签","发现商品共现关系","计算文档向量夹角"],answer:1,explain:"分类是监督学习问题，目标是根据已知类别样本预测新对象所属类别。"},{type:"choice",score:"2 分",tag:"聚类",q:"聚类分析最适合下列哪类任务？",options:["已知流失和未流失标签，预测新用户是否流失","没有预设类别，按相似性划分客户群","计算规则 X -> Y 的置信度","判断文本情感是正面还是负面"],answer:1,explain:"聚类是无监督学习，强调类内相似、类间差异，常用于用户画像和市场细分。"},{type:"choice",score:"2 分",tag:"关联规则",q:"Lift 大于 1 通常表示什么？",options:["X 与 Y 完全无关","X 的出现降低了 Y 出现概率","X 的出现提高了 Y 出现概率","规则支持度一定很高"],answer:2,explain:"Lift 比较 P(Y|X) 与 P(Y)。大于 1 表示 X 出现后 Y 更可能出现。"},{type:"choice",score:"2 分",tag:"模型评估",q:"类别极度不平衡时，只看 Accuracy 可能有什么问题？",options:["会完全无法训练模型","可能掩盖少数类识别能力差的问题","一定导致 Recall 等于 1","会让 Support 无法计算"],answer:1,explain:"例如欺诈检测中负类很多，模型全预测为负也可能有高准确率，但对欺诈样本没有识别价值。"}]},{id:"short",name:"简答",cards:[{type:"subjective",score:"6 分",tag:"CRISP-DM",q:"简述商务分析中知识发现 / CRISP-DM 的六个阶段，并说明每个阶段的主要任务。",hint:"建议覆盖：商业理解、数据理解、数据准备、建模、评估、部署。"},{type:"subjective",score:"6 分",tag:"数据探索",q:"说明数据质量问题主要有哪些类型，并举例说明数据预处理为什么会影响模型效果。",hint:"可从缺失值、异常值、噪声、不一致、重复、编码问题入手。"},{type:"subjective",score:"6 分",tag:"方法选择",q:"比较关联规则、分类分析和聚类分析分别解决什么问题，并各举一个典型商务场景。",hint:"重点区分：共现关系、预测标签、无预设类别发现群组。"},{type:"subjective",score:"6 分",tag:"深度学习",q:"简述深度学习与传统机器学习在数据依赖、特征处理、硬件需求、端到端建模和可解释性方面的差异。",hint:"用对比结构作答更清楚。"},{type:"subjective",score:"6 分",tag:"SNA",q:"社交网络分析中，度中心性、中间中心性和接近中心性分别代表什么业务含义？",hint:"可联系关键用户、桥接节点、信息传播效率。"}]},{id:"calc",name:"计算",cards:[{type:"choice",score:"5 分",tag:"分类指标",q:"某分类模型中 TP=40，FP=10，FN=20，TN=30。Precision 和 Recall 分别是多少？",options:["Precision=0.80，Recall=0.67","Precision=0.67，Recall=0.80","Precision=0.57，Recall=0.75","Precision=0.70，Recall=0.60"],answer:0,explain:"Precision=TP/(TP+FP)=40/50=0.80；Recall=TP/(TP+FN)=40/60≈0.67。",formula:"Precision = TP / (TP + FP)\nRecall = TP / (TP + FN)"},{type:"choice",score:"5 分",tag:"分类指标",q:"延续上一题，Accuracy 和 Specificity 分别是多少？",options:["Accuracy=0.70，Specificity=0.75","Accuracy=0.75，Specificity=0.70","Accuracy=0.80，Specificity=0.60","Accuracy=0.60，Specificity=0.80"],answer:0,explain:"Accuracy=(TP+TN)/(TP+FP+FN+TN)=70/100=0.70；Specificity=TN/(TN+FP)=30/40=0.75。",formula:"Accuracy = (TP + TN) / Total\nSpecificity = TN / (TN + FP)"},{type:"choice",score:"5 分",tag:"关联规则",q:"1000 名顾客中，300 人买 A，240 人买 B，120 人同时买 A 和 B。规则 A -> B 的 Support、Confidence、Lift 分别是？",options:["12%，40%，1.67","30%，50%，2.08","24%，40%，1.33","12%，50%，1.67"],answer:0,explain:"Support=P(A∩B)=120/1000=12%；Confidence=P(B|A)=120/300=40%；Lift=Confidence/P(B)=0.40/0.24≈1.67。",formula:"Support(A -> B) = P(A and B)\nConfidence(A -> B) = P(B | A)\nLift(A -> B) = P(B | A) / P(B)"},{type:"choice",score:"5 分",tag:"关联规则",q:"如果 P(牛奶)=80%，P(牛奶|薯片)=80%，则规则“薯片 -> 牛奶”的 Lift 是多少？含义是什么？",options:["Lift=1，说明薯片没有提高买牛奶的概率","Lift=0.8，说明规则非常有效","Lift=1.6，说明薯片显著提高买牛奶概率","Lift=80，说明规则支持度极高"],answer:0,explain:"Lift=0.80/0.80=1。后件牛奶本身就常见，买薯片并没有带来额外提升。",formula:"Lift = P(Y | X) / P(Y)"},{type:"choice",score:"5 分",tag:"SNA",q:"一个无向网络有 5 个节点、6 条实际边。其网络密度是多少？",options:["0.40","0.50","0.60","0.75"],answer:2,explain:"无向图最多边数为 n(n-1)/2=5*4/2=10。密度=实际边数/最多边数=6/10=0.60。",formula:"Undirected density = actual edges / [n(n - 1) / 2]"},{type:"choice",score:"5 分",tag:"相似度",q:"向量 A=(1,0,1)，B=(1,1,0)。它们的余弦相似度约为多少？",options:["0","0.50","0.71","1.00"],answer:1,explain:"点积为 1，|A|=√2，|B|=√2，余弦相似度=1/(√2*√2)=0.50。",formula:"cos(A, B) = A·B / (|A| |B|)"}]},{id:"app",name:"应用",cards:[{type:"subjective",score:"15 分",tag:"电商推荐",q:"某跨境电商希望提高“猜你喜欢”模块点击量和交叉销售额。请设计一个商务分析方案，包括业务目标、数据需求、数据准备、可选模型、评价指标和部署方式。",hint:"建议按 CRISP-DM 六阶段写；可结合用户画像、推荐、关联规则、分类/聚类。"},{type:"subjective",score:"15 分",tag:"用户流失",q:"某平台发现活跃用户下降。请说明如何构建用户流失预警模型，并说明为什么不能只看 Accuracy。",hint:"建议包括：正类定义、特征、训练/测试、交叉验证、Precision、Recall、F1、业务干预。"}]},{id:"essay",name:"论述",cards:[{type:"subjective",score:"20 分",tag:"AI 与管理",q:"结合大数据和人工智能时代的变化，论述商务分析如何影响企业管理决策，并分析企业在数据质量、隐私伦理、算法公平、可解释性和组织能力方面面临的挑战。",hint:"建议结构：时代变化 -> 商务分析价值 -> 管理挑战 -> 应对建议。"}]}];
    const allCards=sections.flatMap(section=>section.cards.map((card,index)=>({...card,sectionId:section.id,sectionName:section.name,sectionIndex:index})));const storageKey="baMobileExamState";const state=JSON.parse(localStorage.getItem(storageKey)||"{}");let filter="all";let activeSection="all";let current=0;const tabs=document.getElementById("tabs"),stage=document.getElementById("stage"),fill=document.getElementById("fill"),scoreMini=document.getElementById("scoreMini"),modeLabel=document.getElementById("modeLabel"),progressLabel=document.getElementById("progressLabel"),numberGrid=document.getElementById("numberGrid"),jumpPanel=document.getElementById("jumpPanel"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn"),allBtn=document.getElementById("allBtn"),wrongBtn=document.getElementById("wrongBtn");function idOf(card){return `${card.sectionId}-${card.sectionIndex}`}function save(){localStorage.setItem(storageKey,JSON.stringify(state))}function visibleCards(){let cards=activeSection==="all"?allCards:allCards.filter(card=>card.sectionId===activeSection);if(filter==="wrong")cards=cards.filter(card=>card.type==="choice"&&state[idOf(card)]?.done&&!state[idOf(card)]?.correct);return cards}function answeredCount(){return allCards.filter(card=>state[idOf(card)]?.done).length}function correctCount(){return allCards.filter(card=>card.type==="choice"&&state[idOf(card)]?.correct).length}function renderTabs(){tabs.innerHTML="";const items=[{id:"all",name:"全部"},...sections.map(section=>({id:section.id,name:section.name}))];items.forEach(item=>{const btn=document.createElement("button");btn.type="button";btn.className=`tab${activeSection===item.id?" active":""}`;btn.textContent=item.name;btn.addEventListener("click",()=>{activeSection=item.id;current=0;render()});tabs.appendChild(btn)})}function renderChoice(card,index,total){const id=idOf(card),record=state[id],article=document.createElement("article");article.className="card";article.innerHTML=`<div class="meta"><span class="tag">${card.sectionName} · ${card.tag}</span><span class="score">${card.score}</span></div><p class="q">${index+1}. ${card.q}</p>${card.formula?`<div class="formula">${card.formula.replaceAll("\n","<br>")}</div>`:""}<div class="options"></div><div class="feedback ${record?.done?"show "+(record.correct?"correct":"wrong"):""}"></div>`;const options=article.querySelector(".options"),feedback=article.querySelector(".feedback");card.options.forEach((text,optionIndex)=>{const btn=document.createElement("button");btn.type="button";btn.className="option";btn.innerHTML=`<span class="letter">${String.fromCharCode(65+optionIndex)}</span><span>${text}</span>`;if(record?.done){btn.disabled=true;if(optionIndex===card.answer)btn.classList.add("correct");if(optionIndex===record.selected&&record.selected!==card.answer)btn.classList.add("wrong")}btn.addEventListener("click",()=>{state[id]={done:true,selected:optionIndex,correct:optionIndex===card.answer};save();render()});options.appendChild(btn)});if(record?.done){const rightAnswer=`${String.fromCharCode(65+card.answer)}. ${card.options[card.answer]}`;feedback.innerHTML=record.correct?`<strong>✓ 正确</strong><br>${card.explain}`:`<strong>✕ 错误</strong><br>正确答案：${rightAnswer}<br>${card.explain}`}return article}function renderSubjective(card,index){const id=idOf(card),record=state[id]||{},article=document.createElement("article");article.className="card";article.innerHTML=`<div class="meta"><span class="tag">${card.sectionName} · ${card.tag}</span><span class="score">${card.score}</span></div><p class="q">${index+1}. ${card.q}</p><textarea class="answer" placeholder="在手机上直接输入你的答案，系统不会自动判分。">${record.text||""}</textarea><div class="hint">${card.hint}</div><div class="subject-actions"><button class="secondary ${record.done?"done":""}" id="markDone" type="button">${record.done?"已完成":"标记完成"}</button><button class="secondary" id="clearText" type="button">清空本题</button></div>`;const textarea=article.querySelector("textarea");textarea.addEventListener("input",()=>{state[id]={...state[id],text:textarea.value};save()});article.querySelector("#markDone").addEventListener("click",()=>{state[id]={...state[id],done:!state[id]?.done,text:textarea.value};save();render()});article.querySelector("#clearText").addEventListener("click",()=>{state[id]={...state[id],text:""};save();render()});return article}function renderEmpty(){const box=document.createElement("div");box.className="empty";box.textContent=filter==="wrong"?"当前没有错题。做错客观题后会自动出现在这里。":"没有可显示的题目。";return box}function renderNumbers(cards){numberGrid.innerHTML="";cards.forEach((card,index)=>{const record=state[idOf(card)],btn=document.createElement("button");btn.type="button";btn.className="num";if(index===current)btn.classList.add("active");if(record?.done&&card.type!=="choice")btn.classList.add("done");if(record?.correct)btn.classList.add("done");if(record?.done&&card.type==="choice"&&!record.correct)btn.classList.add("wrong");btn.textContent=index+1;btn.addEventListener("click",()=>{current=index;jumpPanel.classList.remove("show");render()});numberGrid.appendChild(btn)})}function render(){const cards=visibleCards();if(current>=cards.length)current=Math.max(0,cards.length-1);const total=cards.length,card=cards[current];renderTabs();allBtn.classList.toggle("active",filter==="all");wrongBtn.classList.toggle("active",filter==="wrong");scoreMini.textContent=`${answeredCount()} / ${allCards.length}`;modeLabel.textContent=filter==="wrong"?"错题回看":activeSection==="all"?"全部题目":sections.find(section=>section.id===activeSection)?.name||"全部题目";progressLabel.textContent=total?`第 ${current+1} 题 / 共 ${total} 题 · 客观题正确 ${correctCount()}`:"暂无题目";fill.style.width=total?`${Math.round((current+1)/total*100)}%`:"0%";stage.innerHTML="";stage.appendChild(card?card.type==="choice"?renderChoice(card,current,total):renderSubjective(card,current):renderEmpty());renderNumbers(cards);prevBtn.disabled=!total||current===0;nextBtn.disabled=!total||current===total-1}prevBtn.addEventListener("click",()=>{current=Math.max(0,current-1);render()});nextBtn.addEventListener("click",()=>{const total=visibleCards().length;current=Math.min(total-1,current+1);render()});document.getElementById("jumpBtn").addEventListener("click",()=>{jumpPanel.classList.add("show");jumpPanel.setAttribute("aria-hidden","false")});document.getElementById("closeJump").addEventListener("click",()=>{jumpPanel.classList.remove("show");jumpPanel.setAttribute("aria-hidden","true")});jumpPanel.addEventListener("click",event=>{if(event.target===jumpPanel){jumpPanel.classList.remove("show");jumpPanel.setAttribute("aria-hidden","true")}});allBtn.addEventListener("click",()=>{filter="all";current=0;render()});wrongBtn.addEventListener("click",()=>{filter="wrong";current=0;render()});document.getElementById("resetBtn").addEventListener("click",()=>{Object.keys(state).forEach(key=>delete state[key]);save();current=0;filter="all";render()});render();if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{})})}
  </script>
